site_name: تعلم الألمانية | Learn German
site_description: موقع تعلم اللغة الألمانية للمبتدئين — Integrationskurs A1/A2
site_author: Ahmad Sharf
site_url: https://study-german.pages.dev

theme:
  name: material
  language: ar
  font: false  # SEC-013: self-hosted via assets/stylesheets/fonts.css
  favicon: assets/images/favicon.svg
  # direction: rtl  # ملغى — direction-fix.js يضبطها ديناميكياً حسب اللغة
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: green
      toggle:
        icon: material/brightness-7
        name: التبديل إلى الوضع المظلم
    - scheme: slate
      primary: indigo
      accent: green
      toggle:
        icon: material/brightness-4
        name: التبديل إلى الوضع الفاتح

extra:
  generator: false
  alternate:
    - name: العربية
      link: /
      lang: ar
    - name: English
      link: /en/
      lang: en

copyright: Copyright &copy; 2026 Ahmad Sharf

extra_css:
  - assets/stylesheets/fonts.css
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/js/video-switcher.js
  - assets/js/exercise-checker.js
  - assets/js/question-bank.js
  - assets/js/level-test.js
  - assets/js/direction-fix.js

