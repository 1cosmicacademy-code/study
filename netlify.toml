[build]
  command = "python3 -m mkdocs build"
  publish = "site/"

[build.environment]
  PYTHON_VERSION = "3.14"

# Redirect /grammatik/index/ → /grammatik/ (MkDocs serves index.md at directory root, not /index/)
[[redirects]]
  from = "/grammatik/index/"
  to = "/grammatik/"
  status = 301

[[redirects]]
  from = "/en/grammatik/index/"
  to = "/en/grammatik/"
  status = 301

# SEC-009: wildcard redirect removed — it allowed open redirect attacks
