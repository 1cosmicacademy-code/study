site_name: تعلم الألمانية | Learn German
site_description: موقع تعلم اللغة الألمانية للمبتدئين — Integrationskurs A1/A2
site_author: Delta Mentor

theme:
  name: material
  language: ar
  direction: rtl
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: التبديل إلى الوضع المظلم
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: التبديل إلى الوضع الفاتح

extra:
  alternate:
    - name: العربية
      link: /
      lang: ar
    - name: English
      link: /en/
      lang: en

copyright: Copyright &copy; 2026 Delta Mentor

extra_javascript:
  - assets/js/video-switcher.js

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: ar
          name: العربية
          build: true
          default: true
          nav_translations:
            Home: الرئيسية
            Level A1: المستوى A1
            A1 Overview: نظرة عامة على A1
            Coursebook: كتاب الدروس (Kursbuch)
            Coursebook Overview: فهرس الدروس
            Exercise Book: كتاب التمارين (Übungsbuch)
            Exercise Book Overview: فهرس التمارين
            Level A2: المستوى A2
            A2 Overview: نظرة عامة على A2
            Grammar: القواعد (Grammatik)
            Grammar Overview: نظرة عامة
            Study Plan: الخطة التعليمية
        - locale: en
          name: English
          build: true
          nav_translations:
            Home: Home
            Level A1: Level A1
            A1 Overview: A1 Overview
            Coursebook: Coursebook
            Coursebook Overview: Coursebook Overview
            Exercise Book: Exercise Book
            Exercise Book Overview: Exercise Book Overview
            Level A2: Level A2
            A2 Overview: A2 Overview
            Grammar: Grammar
            Grammar Overview: Grammar Overview
            Study Plan: Study Plan

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

